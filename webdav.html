<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebDAV 上传中心 | 1940Netdisk</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="stylesheet" href="/theme.css" />
    <script src="/theme.js?v=20260305"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css" />
    <style>
      /* ===== webdav.html 专属样式 =====
       * 钢铁玻璃风格 — 军工业色板 + 毛玻璃卡片 + 噪声纹理
       * 复用 theme.css CSS 变量体系
       */
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-primary);
        background-attachment: fixed;
        color: var(--text-primary);
        font-family: 'Roboto', 'Noto Sans SC', 'PingFang SC', sans-serif;
      }

      .page {
        max-width: 1360px;
        margin: 0 auto;
        padding: 20px;
      }

      /* ===== 顶部导航 ===== */
      .w-header {
        position: sticky;
        top: 20px;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 22px;
        border-radius: 3px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(90,107,74,0.4);
        border-bottom: 2px solid var(--olive);
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .w-header-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-display);
        font-size: 1.4rem;
        font-weight: 400;
        letter-spacing: 0.05em;
        color: var(--khaki);
        margin: 0;
        text-transform: uppercase;
      }

      .w-header-title i { color: var(--gold); }

      .w-header-title .sub {
        font-family: var(--font-body);
        font-weight: 400;
        font-size: 0.65rem;
        color: var(--text-muted);
        letter-spacing: 0;
        margin-left: 2px;
      }

      .w-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .w-logo {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        object-fit: cover;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        background: var(--surface-elevated);
      }

      /* ===== 布局 ===== */
      .w-layout {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .w-toolbar-row {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 3px;
        border: 1px solid rgba(90,107,74,0.4);
        background: rgba(255,255,255,0.03);
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        flex-wrap: wrap;
      }

      .w-toolbar-left,
      .w-toolbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      /* ===== 状态药丸 ===== */
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 12px;
        border-radius: 20px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 500;
      }

      .status-pill .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-muted);
      }

      .status-pill.ok { border-color: var(--olive); background: rgba(90,107,74,0.12); color: var(--olive); }
      .status-pill.ok .status-dot { background: var(--olive); }
      .status-pill.bad { border-color: var(--danger, #b91c1c); background: rgba(185,28,28,0.1); color: var(--danger, #b91c1c); }
      .status-pill.bad .status-dot { background: var(--danger, #b91c1c); }

      /* ===== 卡片 ===== */
      .w-card {
        border: 1px solid rgba(90,107,74,0.4);
        background: rgba(255,255,255,0.03);
        border-radius: 3px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        padding: 16px;
        transition: box-shadow 0.2s ease;
      }

      .w-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.5); }

      .w-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 12px;
      }

      .w-card h2 {
        margin: 0;
        font-size: 1.05rem;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-display);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--khaki);
      }

      .w-card h2 i { color: var(--gold); }

      .w-card-sub {
        margin-top: 4px;
        color: var(--text-muted);
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .w-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .input-label {
        display: block;
        margin-bottom: 6px;
        color: var(--text-secondary);
        font-size: 0.84rem;
        font-weight: 600;
      }

      .w-hint {
        margin: 10px 0 0;
        color: var(--text-muted);
        font-size: 0.84rem;
      }

      .w-status-line {
        color: var(--text-secondary);
        font-size: 0.88rem;
      }
      .w-status-line.ok { color: var(--olive); }
      .w-status-line.bad { color: var(--danger, #b91c1c); }

      .span-2 { grid-column: 1 / -1; }

      /* ===== 文件选择器 ===== */
      .upload-file-row {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }

      .file-picker {
        position: relative;
        flex: 1;
        min-height: 70px;
        border-radius: var(--radius-md);
        border: 1px dashed var(--steel);
        background: var(--glass-bg);
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        cursor: pointer;
      }

      .file-picker:hover {
        border-color: var(--gold);
        box-shadow: 0 4px 16px rgba(212,175,55,0.15);
        transform: translateY(-1px);
      }

      .file-picker.is-dragover {
        border-color: var(--olive);
        box-shadow: 0 6px 18px rgba(90,107,74,0.2);
        background: rgba(90,107,74,0.06);
      }

      .file-picker.has-files { border-style: solid; }

      .file-input-native {
        position: absolute;
        width: 1px; height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        border: 0;
      }

      .file-choose-btn {
        border-radius: 20px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        min-height: 38px;
        padding: 8px 14px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        white-space: nowrap;
        cursor: pointer;
        color: var(--text-primary);
        font-weight: 500;
        transition: all 0.15s;
      }

      .file-choose-btn:hover { border-color: var(--steel); background: var(--hover-bg); }

      .file-picker-meta { min-width: 0; flex: 1; }

      .file-picker-title {
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .file-picker-hint {
        margin-top: 3px;
        color: var(--text-muted);
        font-size: 0.8rem;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .file-count-badge {
        flex: 0 0 auto;
        border-radius: 20px;
        border: 1px solid var(--badge-border);
        background: var(--badge-bg);
        color: var(--steel);
        font-size: 0.78rem;
        font-weight: 700;
        padding: 5px 10px;
      }

      #uploadFilesBtn { min-width: 120px; }

      /* ===== 文件队列 ===== */
      .file-queue-wrap {
        margin-top: 12px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        border-radius: var(--radius-sm);
        padding: 10px;
      }

      .file-queue-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .file-queue-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      .file-queue-clear {
        border-radius: 20px;
        padding: 5px 10px;
        font-size: 0.78rem;
        border: 1px solid var(--danger, #b91c1c);
        background: rgba(185,28,28,0.08);
        color: var(--danger, #b91c1c);
        cursor: pointer;
        transition: all 0.15s;
      }

      .file-queue-clear:hover { filter: brightness(1.1); }

      .file-queue-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 6px;
      }

      .file-queue-item {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 6px 8px;
        background: var(--surface-elevated);
      }

      .file-queue-icon {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--badge-bg);
        color: var(--steel);
        flex: 0 0 auto;
      }

      .file-queue-meta { min-width: 0; flex: 1; }
      .file-queue-name {
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-queue-size {
        margin-top: 2px;
        font-size: 0.76rem;
        color: var(--text-muted);
      }
      .file-queue-more {
        text-align: center;
        font-size: 0.76rem;
        color: var(--text-muted);
        padding: 4px 0 2px;
      }

      /* ===== 通用输入/按钮覆盖 ===== */
      input.w-input, .w-input {
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        background: var(--surface-elevated);
        color: var(--text-primary);
        padding: 9px 12px;
        font-family: inherit;
        font-size: 0.9rem;
        transition: border-color 0.15s;
      }

      input.w-input:focus {
        outline: none;
        border-color: var(--steel);
        box-shadow: 0 0 0 2px rgba(107,122,138,0.15);
      }

      input[type="text"].w-input {
        min-width: 260px;
        flex: 1;
      }

      button.w-btn {
        cursor: pointer;
        border-radius: 3px;
        padding: 9px 14px;
        border: 1.5px solid var(--khaki);
        background: var(--olive);
        color: var(--khaki-light);
        transition: all 0.15s;
        font-family: var(--font-display);
        font-size: 0.85rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      button.w-btn:hover { background: var(--olive-light); border-color: var(--gold); color: var(--gold-light); box-shadow: 0 0 15px rgba(212,175,55,0.3); }
      button.w-btn[disabled] { opacity: 0.55; cursor: wait; }

      .w-btn-primary {
        background: rgba(90, 130, 255, 0.2);
        border-color: rgba(90, 130, 255, 0.3);
        color: #8aafff;
      }

      .w-btn-primary:hover {
        background: rgba(90, 130, 255, 0.3);
        border-color: rgba(90, 130, 255, 0.5);
        color: #aac4ff;
        box-shadow: 0 0 15px rgba(90, 130, 255, 0.3);
      }

      .w-btn-danger {
        background: var(--rust);
        border-color: var(--rust-light);
        color: var(--khaki-light);
      }

      .w-btn-danger:hover { background: var(--rust); border-color: var(--gold); opacity: 0.9; }

      .result-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      /* ===== 结果列表 ===== */
      .result-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .result-item {
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        background: var(--surface-elevated);
        padding: 10px 12px;
        display: grid;
        gap: 4px;
      }

      .result-item .result-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-primary);
        word-break: break-word;
      }

      .result-item .result-title.error { color: var(--danger, #b91c1c); }

      .result-item .result-meta {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .result-list a {
        color: var(--steel);
        font-size: 0.84rem;
        word-break: break-all;
      }

      .result-empty {
        padding: 20px 16px;
        text-align: center;
        color: var(--text-muted);
        border: 1px dashed var(--border-subtle);
        border-radius: 10px;
      }

      /* ===== 响应式 ===== */
      @media (max-width: 980px) {
        .w-layout { grid-template-columns: 1fr; }
        .span-2 { grid-column: auto; }
      }

      @media (max-width: 640px) {
        .page { padding: 10px; }
        .w-header { top: 8px; padding: 10px 14px; flex-wrap: wrap; }
        .w-header-title { width: 100%; font-size: 1.1rem; }
        .w-header-title .sub { display: none; }
        .w-header-actions { width: 100%; justify-content: flex-start; overflow-x: auto; scrollbar-width: none; }
        .w-header-actions::-webkit-scrollbar { display: none; }
        .nav-btn, .action-link { flex: 0 0 auto; font-size: 0.8rem; padding: 6px 10px; }
        .w-toolbar-row { flex-direction: column; align-items: flex-start; }
        .upload-file-row { flex-direction: column; }
        #uploadFilesBtn { width: 100%; }
        input[type="text"].w-input { min-width: 0; }
      }
    </style>
    <link rel="stylesheet" href="/mobile-refactor.css" />
  </head>
  <body>
    <main class="page">
      <!-- 顶部导航 -->
      <header class="w-header">
        <h1 class="w-header-title">
          <i class="fas fa-hard-drive" style="font-size:1.3em;color:var(--gold);"></i>
          <span>WebDAV 上传</span>
          <span class="sub">| 1940Netdisk</span>
        </h1>
        <div class="w-header-actions">
          <a class="nav-btn" href="./index.html"><i class="fas fa-upload"></i><span>上传</span></a>
          <a class="nav-btn" href="./gallery.html"><i class="fas fa-images"></i><span>图库</span></a>
          <a class="nav-btn" href="./admin.html"><i class="fas fa-cog"></i><span>管理</span></a>
          <a class="nav-btn active" href="./webdav.html"><i class="fas fa-network-wired"></i><span>WebDAV</span></a>
          <button type="button" class="nav-btn" data-theme-toggle aria-label="切换主题">
            <i class="fas fa-moon" data-theme-icon></i>
            <span data-theme-label>夜间</span>
          </button>
        </div>
      </header>

      <!-- 布局 -->
      <section class="w-layout">
        <!-- 工具栏行 -->
        <article class="w-toolbar-row">
          <div class="w-toolbar-left">
            <div class="status-pill" id="statusPill">
              <span class="status-dot"></span>
              <span id="statusText">正在检测 WebDAV 状态...</span>
            </div>
            <div class="status-pill">
              <i class="fas fa-folder-tree"></i>
              <span id="folderPathPreview">当前目录：根目录</span>
            </div>
          </div>
          <div class="w-toolbar-right">
            <button id="copyAllBtn" type="button" class="w-btn">复制全部链接</button>
            <button id="clearResultBtn" type="button" class="w-btn w-btn-danger">清空记录</button>
          </div>
        </article>

        <!-- WebDAV 状态 -->
        <article class="w-card">
          <div class="w-card-header">
            <div>
              <h2><i class="fas fa-circle-info"></i> WebDAV 状态</h2>
              <p class="w-card-sub">用于确认 WebDAV 配置和连接情况。</p>
            </div>
            <button id="refreshStatusBtn" type="button" class="w-btn"><i class="fas fa-rotate"></i> 刷新</button>
          </div>
          <p id="statusDetailText" class="w-status-line">等待检测</p>
        </article>

        <!-- 上传目录 -->
        <article class="w-card">
          <div class="w-card-header">
            <div>
              <h2><i class="fas fa-folder-open"></i> 上传目录</h2>
              <p class="w-card-sub">可填写多级目录，例如：项目A/一月。</p>
            </div>
          </div>
          <label class="input-label" for="folderPathInput">目录路径</label>
          <div class="w-row">
            <input id="folderPathInput" class="w-input" type="text" placeholder="留空则上传到根目录" />
          </div>
          <p class="w-hint">后台可继续移动目录，已生成直链不会受影响。</p>
        </article>

        <!-- 文件上传 -->
        <article class="w-card">
          <div class="w-card-header">
            <div>
              <h2><i class="fas fa-cloud-upload-alt"></i> 文件上传</h2>
              <p class="w-card-sub">支持批量上传到 WebDAV。</p>
            </div>
          </div>
          <div class="upload-file-row">
            <div class="file-picker" id="filePickerBox" role="button" tabindex="0" aria-label="选择或拖拽文件">
              <input id="fileInput" class="file-input-native" type="file" multiple />
              <button id="chooseFileBtn" type="button" class="file-choose-btn">
                <i class="fas fa-folder-open"></i>
                <span>选择文件</span>
              </button>
              <div class="file-picker-meta">
                <div id="filePickerTitle" class="file-picker-title">未选择任何文件</div>
                <div id="filePickerHint" class="file-picker-hint">支持多选、拖拽到此区域，上传后自动记录直链</div>
              </div>
              <span id="fileCountBadge" class="file-count-badge">0 个</span>
            </div>
            <button id="uploadFilesBtn" type="button" class="w-btn w-btn-primary">开始上传</button>
          </div>
          <div id="fileQueueWrap" class="file-queue-wrap" style="display:none;">
            <div class="file-queue-head">
              <span class="file-queue-title"><i class="fas fa-list-ul"></i> 待上传队列</span>
              <button id="clearQueueBtn" type="button" class="file-queue-clear">清空队列</button>
            </div>
            <ul id="fileQueueList" class="file-queue-list"></ul>
          </div>
        </article>

        <!-- URL 上传 -->
        <article class="w-card">
          <div class="w-card-header">
            <div>
              <h2><i class="fas fa-link"></i> URL 上传</h2>
              <p class="w-card-sub">输入文件地址，服务器将自动拉取并上传。</p>
            </div>
          </div>
          <div class="w-row">
            <input id="urlInput" class="w-input" type="text" placeholder="https://example.com/file.zip" />
            <button id="uploadUrlBtn" type="button" class="w-btn w-btn-primary">上传 URL</button>
          </div>
        </article>

        <!-- 上传结果 -->
        <article class="w-card span-2">
          <div class="w-card-header">
            <h2><i class="fas fa-list-check"></i> 上传结果</h2>
            <div class="result-tools">
              <span id="resultCount" class="w-card-sub">0 条</span>
            </div>
          </div>
          <div id="resultEmpty" class="result-empty">暂无上传结果，完成上传后将显示在这里。</div>
          <ul id="resultList" class="result-list"></ul>
        </article>
      </section>
    </main>

    <script>
      (function () {
        "use strict";

        var statusPill = document.getElementById("statusPill");
        var statusText = document.getElementById("statusText");
        var statusDetailText = document.getElementById("statusDetailText");
        var folderPathPreview = document.getElementById("folderPathPreview");
        var folderPathInput = document.getElementById("folderPathInput");
        var filePickerBox = document.getElementById("filePickerBox");
        var chooseFileBtn = document.getElementById("chooseFileBtn");
        var filePickerTitle = document.getElementById("filePickerTitle");
        var filePickerHint = document.getElementById("filePickerHint");
        var fileCountBadge = document.getElementById("fileCountBadge");
        var fileQueueWrap = document.getElementById("fileQueueWrap");
        var fileQueueList = document.getElementById("fileQueueList");
        var clearQueueBtn = document.getElementById("clearQueueBtn");
        var fileInput = document.getElementById("fileInput");
        var uploadFilesBtn = document.getElementById("uploadFilesBtn");
        var urlInput = document.getElementById("urlInput");
        var uploadUrlBtn = document.getElementById("uploadUrlBtn");
        var resultList = document.getElementById("resultList");
        var resultEmpty = document.getElementById("resultEmpty");
        var resultCount = document.getElementById("resultCount");
        var refreshStatusBtn = document.getElementById("refreshStatusBtn");
        var clearResultBtn = document.getElementById("clearResultBtn");
        var copyAllBtn = document.getElementById("copyAllBtn");
        var resultLinks = [];
        var fallbackSelectedFiles = [];

        function normalizeFolderPath(value) {
          return String(value || "").replace(/\\/g, "/").replace(/^\/+|\/+$/g, "").trim();
        }

        function updateFolderPreview() {
          var folderPath = normalizeFolderPath(folderPathInput.value);
          folderPathPreview.textContent = "当前目录：" + (folderPath || "根目录");
          try { localStorage.setItem("webdavFolderPath", folderPath); } catch { /* ignore */ }
        }

        function ensureArray(value) {
          if (Array.isArray(value)) return value;
          if (value == null) return [];
          if (typeof value.length === "number") return Array.prototype.slice.call(value);
          return [value];
        }

        function formatFileSize(bytes) {
          var value = Number(bytes || 0);
          if (!Number.isFinite(value) || value <= 0) return "0 B";
          var units = ["B", "KB", "MB", "GB", "TB"];
          var index = 0;
          while (value >= 1024 && index < units.length - 1) {
            value /= 1024;
            index += 1;
          }
          return value.toFixed(value >= 100 || index === 0 ? 0 : 1) + " " + units[index];
        }

        function resolveFileIconClass(file) {
          var name = String((file && file.name) || "").toLowerCase();
          var mime = String((file && file.type) || "").toLowerCase();
          if (mime.startsWith("image/")) return "fas fa-image";
          if (mime.startsWith("video/")) return "fas fa-film";
          if (mime.startsWith("audio/")) return "fas fa-music";
          if (mime.includes("zip") || mime.includes("rar") || mime.includes("7z") || /\.zip$|\.rar$|\.7z$|\.tar$|\.gz$/i.test(name)) return "fas fa-file-archive";
          if (mime.includes("pdf") || /\.pdf$/i.test(name)) return "fas fa-file-pdf";
          if (mime.includes("word") || /\.docx?$|\.odt$/i.test(name)) return "fas fa-file-word";
          if (mime.includes("excel") || /\.xlsx?$|\.csv$/i.test(name)) return "fas fa-file-excel";
          if (mime.includes("text") || /\.txt$|\.md$/i.test(name)) return "fas fa-file-lines";
          return "fas fa-file";
        }

        function renderFileQueue(files) {
          var list = ensureArray(files);
          if (!list.length) {
            fileQueueWrap.style.display = "none";
            fileQueueList.innerHTML = "";
            return;
          }
          fileQueueWrap.style.display = "block";
          fileQueueList.innerHTML = "";
          var maxVisible = 6;
          list.slice(0, maxVisible).forEach(function (file) {
            var item = document.createElement("li");
            item.className = "file-queue-item";
            var icon = document.createElement("span");
            icon.className = "file-queue-icon";
            var iconNode = document.createElement("i");
            iconNode.className = resolveFileIconClass(file);
            icon.appendChild(iconNode);
            var meta = document.createElement("div");
            meta.className = "file-queue-meta";
            var name = document.createElement("div");
            name.className = "file-queue-name";
            name.textContent = String(file.name || "未命名文件");
            var size = document.createElement("div");
            size.className = "file-queue-size";
            size.textContent = formatFileSize(file.size || 0);
            meta.appendChild(name);
            meta.appendChild(size);
            item.appendChild(icon);
            item.appendChild(meta);
            fileQueueList.appendChild(item);
          });

          if (list.length > maxVisible) {
            var more = document.createElement("li");
            more.className = "file-queue-more";
            more.textContent = "还有 " + (list.length - maxVisible) + " 个文件未展开";
            fileQueueList.appendChild(more);
          }
        }

        function getSelectedFiles() {
          var chosen = ensureArray(fileInput.files);
          if (chosen.length) return chosen;
          return ensureArray(fallbackSelectedFiles);
        }

        function updateFilePickerState(files) {
          var picked = ensureArray(files);
          var count = picked.length;
          if (!count) {
            filePickerBox.classList.remove("has-files");
            filePickerTitle.textContent = "未选择任何文件";
            filePickerHint.textContent = "支持多选、拖拽到此区域，上传后自动记录直链";
            fileCountBadge.textContent = "0 个";
            renderFileQueue([]);
            return;
          }

          var totalBytes = picked.reduce(function (sum, file) {
            return sum + Number((file && file.size) || 0);
          }, 0);
          var firstName = (picked[0] && picked[0].name) ? picked[0].name : "文件";
          filePickerBox.classList.add("has-files");
          fileCountBadge.textContent = count + " 个";
          if (count === 1) {
            filePickerTitle.textContent = firstName;
            filePickerHint.textContent = "大小：" + formatFileSize(totalBytes) + "，点击“开始上传”继续";
            renderFileQueue(picked);
            return;
          }
          filePickerTitle.textContent = "已选择 " + count + " 个文件";
          filePickerHint.textContent = "总大小：" + formatFileSize(totalBytes) + "，首个文件：" + firstName;
          renderFileQueue(picked);
        }

        function syncFilesFromDrop(files) {
          var dropped = ensureArray(files).filter(Boolean);
          if (!dropped.length) return;
          fallbackSelectedFiles = dropped;
          try {
            if (typeof DataTransfer !== "undefined") {
              var dt = new DataTransfer();
              dropped.forEach(function (file) { dt.items.add(file); });
              fileInput.files = dt.files;
              fallbackSelectedFiles = [];
            }
          } catch { /* keep fallbackSelectedFiles */ }
          updateFilePickerState(getSelectedFiles());
        }

        function clearSelectedFiles() {
          fileInput.value = "";
          fallbackSelectedFiles = [];
          updateFilePickerState([]);
        }

        function toAbsoluteUrl(value) {
          var raw = String(value || "").trim();
          if (!raw) return "";
          try { return new URL(raw, window.location.origin).toString(); }
          catch { return raw; }
        }

        function renderResultState() {
          resultCount.textContent = resultList.children.length + " 条";
          resultEmpty.style.display = resultList.children.length > 0 ? "none" : "block";
        }

        function pushResult(message, kind, link) {
          var item = document.createElement("li");
          item.className = "result-item";

          var title = document.createElement("div");
          title.className = "result-title" + (kind === "error" ? " error" : "");
          title.textContent = message;

          var meta = document.createElement("div");
          meta.className = "result-meta";
          meta.textContent = new Date().toLocaleString("zh-CN", { hour12: false }) + " · " + (normalizeFolderPath(folderPathInput.value) || "根目录");

          item.appendChild(title);
          item.appendChild(meta);

          if (link) {
            var absoluteLink = toAbsoluteUrl(link);
            var anchor = document.createElement("a");
            anchor.href = absoluteLink;
            anchor.target = "_blank";
            anchor.rel = "noopener";
            anchor.textContent = absoluteLink;
            item.appendChild(anchor);
            resultLinks.unshift(absoluteLink);
          }

          resultList.prepend(item);
          if (resultList.children.length > 120) resultList.removeChild(resultList.lastChild);
          if (resultLinks.length > 120) resultLinks = resultLinks.slice(0, 120);
          renderResultState();
        }

        async function request(url, options) {
          var response = await fetch(url, Object.assign({ credentials: "include" }, options || {}));
          var data = await response.json().catch(function () { return null; });

          if (!response.ok) {
            var message = data && (data.error || data.message || data.errorDetail);
            if (!message) message = "请求失败（" + response.status + "）";
            throw new Error(message);
          }
          return data;
        }

        function setStatus(message, ok) {
          statusPill.classList.remove("ok", "bad");
          if (ok === true) statusPill.classList.add("ok");
          if (ok === false) statusPill.classList.add("bad");
          statusText.textContent = message;
          statusDetailText.textContent = message;
        }

        async function checkStatus() {
          setStatus("正在检测 WebDAV 状态...", null);
          var data = await request("./api/status");
          var webdav = data.webdav || {};
          var ok = Boolean(webdav.connected && webdav.enabled);
          if (ok) {
            setStatus("WebDAV 已连接并启用，可正常上传。", true);
          } else {
            var detail = webdav.message || "未配置";
            setStatus("WebDAV 当前不可用：" + detail, false);
          }
        }

        async function uploadFiles() {
          var files = getSelectedFiles();
          if (!files.length) { setStatus("请先选择要上传的文件。", false); return; }

          uploadFilesBtn.disabled = true;
          try {
            var folderPath = normalizeFolderPath(folderPathInput.value);
            for (var i = 0; i < files.length; i += 1) {
              setStatus("正在上传第 " + (i + 1) + " / " + files.length + " 个文件...", null);
              var form = new FormData();
              form.append("file", files[i]);
              form.append("storageMode", "webdav");
              form.append("folderPath", folderPath);
              var payload = await request("./upload", { method: "POST", body: form });
              var first = Array.isArray(payload) ? payload[0] : payload;
              var src = first && first.src ? String(first.src) : "";
              if (src) {
                pushResult("文件上传成功", "ok", toAbsoluteUrl(src));
              } else {
                pushResult("文件上传成功，但未返回直链。", "ok");
              }
            }
            clearSelectedFiles();
            setStatus("全部文件上传完成。", true);
          } finally {
            uploadFilesBtn.disabled = false;
          }
        }

        async function uploadFromUrl() {
          var sourceUrl = String(urlInput.value || "").trim();
          if (!sourceUrl) { setStatus("请先输入 URL 地址。", false); return; }

          uploadUrlBtn.disabled = true;
          try {
            var folderPath = normalizeFolderPath(folderPathInput.value);
            setStatus("正在拉取远程地址并上传...", null);
            var payload = await request("./api/upload-from-url", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url: sourceUrl, storageMode: "webdav", folderPath: folderPath }),
            });
            var first = Array.isArray(payload) ? payload[0] : payload;
            var src = first && (first.src || first.url || (first.file && first.file.src));
            if (src) {
              pushResult("URL 上传成功", "ok", toAbsoluteUrl(String(src)));
            } else {
              pushResult("URL 上传完成。", "ok");
            }
            setStatus("URL 上传完成。", true);
          } finally {
            uploadUrlBtn.disabled = false;
          }
        }

        async function ensureAuth() {
          var auth = await request("./api/auth/check");
          if (auth.authRequired && !auth.authenticated) {
            var redirect = encodeURIComponent(window.location.pathname + window.location.search);
            window.location.href = "./login.html?redirect=" + redirect;
            return false;
          }
          return true;
        }

        function onError(prefix, error) {
          var message = prefix + "：" + ((error && error.message) || "未知错误");
          pushResult(message, "error");
          setStatus(message, false);
        }

        folderPathInput.addEventListener("input", updateFolderPreview);

        clearQueueBtn.addEventListener("click", function (event) {
          event.preventDefault();
          clearSelectedFiles();
          setStatus("已清空待上传队列。", null);
        });

        chooseFileBtn.addEventListener("click", function (event) {
          event.preventDefault();
          event.stopPropagation();
          fileInput.click();
        });

        filePickerBox.addEventListener("click", function (event) {
          var target = event.target;
          if (target && target.id === "chooseFileBtn") return;
          fileInput.click();
        });

        filePickerBox.addEventListener("keydown", function (event) {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            fileInput.click();
          }
        });

        filePickerBox.addEventListener("dragover", function (event) {
          event.preventDefault();
          filePickerBox.classList.add("is-dragover");
        });

        filePickerBox.addEventListener("dragenter", function (event) {
          event.preventDefault();
          filePickerBox.classList.add("is-dragover");
        });

        filePickerBox.addEventListener("dragleave", function (event) {
          var next = event.relatedTarget;
          if (next && filePickerBox.contains(next)) return;
          filePickerBox.classList.remove("is-dragover");
        });

        filePickerBox.addEventListener("drop", function (event) {
          event.preventDefault();
          filePickerBox.classList.remove("is-dragover");
          var dropped = event.dataTransfer ? ensureArray(event.dataTransfer.files) : [];
          if (!dropped.length) return;
          syncFilesFromDrop(dropped);
          setStatus("已拖入 " + dropped.length + " 个文件，点击“开始上传”即可。", null);
        });

        fileInput.addEventListener("change", function () {
          fallbackSelectedFiles = [];
          var files = getSelectedFiles();
          updateFilePickerState(files);
          if (!files.length) { setStatus("请选择要上传的文件。", null); return; }
          setStatus("已选择 " + files.length + " 个文件，点击“开始上传”即可。", null);
        });

        refreshStatusBtn.addEventListener("click", function () {
          checkStatus().catch(function (error) { setStatus(error.message || "状态检测失败。", false); });
        });

        uploadFilesBtn.addEventListener("click", function () {
          uploadFiles().catch(function (error) { onError("文件上传失败", error); });
        });

        uploadUrlBtn.addEventListener("click", function () {
          uploadFromUrl().catch(function (error) { onError("URL 上传失败", error); });
        });

        urlInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") { event.preventDefault(); uploadUrlBtn.click(); }
        });

        clearResultBtn.addEventListener("click", function () {
          resultList.innerHTML = "";
          resultLinks = [];
          renderResultState();
          setStatus("已清空上传记录。", null);
        });

        copyAllBtn.addEventListener("click", function () {
          var links = resultLinks.filter(Boolean);
          if (!links.length) { setStatus("当前没有可复制的链接。", false); return; }
          var text = links.join("\n");
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text)
              .then(function () { setStatus("已复制 " + links.length + " 条链接。", true); })
              .catch(function (error) { setStatus(error.message || "复制失败。", false); });
            return;
          }
          var textarea = document.createElement("textarea");
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          var copied = false;
          try { copied = document.execCommand("copy"); } catch { copied = false; }
          textarea.remove();
          setStatus(copied ? ("已复制 " + links.length + " 条链接。") : "复制失败。", copied);
        });

        (async function init() {
          var cachedFolderPath = "";
          try { cachedFolderPath = localStorage.getItem("webdavFolderPath") || ""; } catch { cachedFolderPath = ""; }
          folderPathInput.value = normalizeFolderPath(cachedFolderPath);
          updateFolderPreview();
          renderResultState();
          updateFilePickerState([]);

          var authenticated = await ensureAuth();
          if (!authenticated) return;
          await checkStatus();
        })().catch(function (error) {
          setStatus(error.message || "页面初始化失败。", false);
        });
      })();
    </script>
  </body>
</html>
