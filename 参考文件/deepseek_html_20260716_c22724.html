        /* ... 完整样式请复制 index.html 中的 <style> 全部内容 ... */

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .section-header h2 {
            font-family: var(--font-title);
            font-size: 1.5rem;
            letter-spacing: 0.05em;
            color: var(--khaki);
            font-weight: 400;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-card);
            padding: 1.2rem 1.5rem;
            backdrop-filter: blur(8px);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sharp);
            padding: 0.5rem 0.8rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
            transition: border-color var(--transition);
            width: 100%;
            max-width: 260px;
        }
        .input-glass:focus {
            border-color: var(--gold);
        }
        .flex-row {
            display: flex;
            gap: 0.8rem;

            align-items: center;
        }
        /* 由于篇幅，此处省略重复样式，但实际文件需完整包含所有样式。 */
        /* 建议直接复制 index.html 的 <style> 部分。 */
    </style>
</head>
<body>
    <!-- ===== 导航栏（与 index 一致） ===== -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html" class="logo">1940<span>· 网盘</span></a>
            <div class="nav-breadcrumb">
                <a href="home.html">首页</a><span class="sep">/</span>
                <span style="color:var(--khaki);">用户管理</span>
            </div>
        </div>
        <div class="nav-right">
            <div class="user-avatar" onclick="alert('用户管理')">司</div>
        </div>
    </nav>

    <!-- 主布局 -->
    <div class="main-layout">
        <aside class="sidebar">
            <span class="sidebar-section">导航</span>
            <a href="home.html" class="sidebar-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>首页
            </a>
            <a href="index.html" class="sidebar-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>全部文件
            </a>
            <a href="users.html" class="sidebar-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>用户管理
            </a>
            <a href="groups.html" class="sidebar-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>身份组
            </a>
            <a href="sections.html" class="sidebar-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>版块管理
            </a>
            <div class="storage-info">
                <div class="storage-label">存储空间</div>
                <div class="storage-bar"><div class="storage-fill" style="width:62%;"></div></div>
                <div class="storage-text">已用 6.2 GB / 10 GB</div>
            </div>
        </aside>

        <main class="content-area">
            <div class="section-header">
                <h2>用户管理</h2>
                <button class="btn btn-primary" onclick="document.getElementById('addUserPanel').style.display='block'">+ 添加用户</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>用户名</th><th>角色</th><th>所属身份组</th><th>操作</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
            <div id="addUserPanel" style="display:none; margin-top:20px;" class="glass-card">
                <h4 style="margin-bottom:12px;">添加新用户</h4>
                <div class="flex-row">
                    <input class="input-glass" id="newUsername" placeholder="用户名" />
                    <input class="input-glass" id="newPassword" placeholder="密码" type="password" />
                    <select class="input-glass" id="newUserRole" style="max-width:120px;">
                        <option value="user">用户</option>
                        <option value="admin">管理员</option>
                    </select>
                    <button class="btn btn-primary" onclick="confirmAddUser()">确认添加</button>
                    <button class="btn" onclick="document.getElementById('addUserPanel').style.display='none'">取消</button>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script>
        // ================================================================
        //  数据层（与 index 相同）
        // ================================================================
        const STORAGE_KEY = 'netdisk1940_data';
        function getDefaultData() { /* 同 index */ }
        function loadData() { /* 同 index */ }
        function saveData(data) { /* 同 index */ }
        let data = loadData();

        // ================================================================
        //  工具函数（与 index 相同）
        // ================================================================
        function findUser(id) { return data.users.find(u => u.id === id); }
        function findGroup(id) { return data.groups.find(g => g.id === id); }
        function findSection(id) { return data.sections.find(s => s.id === id); }
        function findFile(id) { return data.files.find(f => f.id === id); }
        function getCurrentUser() { return findUser(data.currentUserId); }
        function genId(prefix, key) { /* 同 index */ }
        function formatSize(bytes) { /* 同 index */ }
        function formatDate(ts) { /* 同 index */ }

        // ================================================================
        //  用户管理专用
        // ================================================================
        function renderUsers() {
            const tbody = document.getElementById('userTableBody');
            if (!tbody) return;
            let html = '';
            data.users.forEach(u => {
                const groupNames = u.groupIds.map(id => findGroup(id)?.name).filter(Boolean).join(', ') || '无';
                html += `
                    <tr>
                        <td><strong>${u.username}</strong></td>
                        <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role === 'admin' ? '管理员' : '用户'}</span></td>
                        <td>${groupNames}</td>
                        <td>
                            ${u.id !== data.currentUserId ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">删除</button>` : '—'}
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        function deleteUser(id) {
            if (!confirm('确认删除该用户？')) return;
            const user = findUser(id);
            if (!user) return;
            data.groups.forEach(g => {
                g.userIds = g.userIds.filter(uid => uid !== id);
            });
            data.users = data.users.filter(u => u.id !== id);
            saveData(data);
            renderUsers();
            showToast('已删除用户');
        }

        function confirmAddUser() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            const role = document.getElementById('newUserRole').value;
            if (!username || !password) return alert('用户名和密码不能为空');
            if (data.users.some(u => u.username === username)) return alert('用户名已存在');
            const newUser = {
                id: genId('u', 'user'),
                username,
                password,
                role,
                groupIds: []
            };
            data.users.push(newUser);
            saveData(data);
            renderUsers();
            document.getElementById('addUserPanel').style.display = 'none';
            showToast('用户添加成功');
        }

        // ================================================================
        //  Toast（与 index 相同）
        // ================================================================
        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transition = '0.3s';
                setTimeout(() => t.remove(), 300);
            }, 2000);
        }

        // ================================================================
        //  初始化
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            renderUsers();
        });

        // 暴露全局函数
        window.renderUsers = renderUsers;
        window.deleteUser = deleteUser;
        window.confirmAddUser = confirmAddUser;
        window.showToast = showToast;
    </script>

    <!-- 由于样式未完整复制，实际使用时请确保 <style> 中包含了所有必要样式（如 .badge-admin, .badge-user, .toast 等） -->
</body>
</html>
