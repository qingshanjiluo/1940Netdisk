services:
  k-vault:
    image: ${KVAULT_IMAGE:-ghcr.io/katelya77/k-vault:latest}
    container_name: kvault
    env_file:
      - path: .env
        required: false
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - kvault_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kvault-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - kvault_redis:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    profiles:
      - redis

volumes:
  kvault_data:
  kvault_redis:
