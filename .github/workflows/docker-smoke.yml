name: Docker Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          CONFIG_ENCRYPTION_KEY=ci_config_encryption_key_0123456789abcdef0123456789abcdef
          SESSION_SECRET=ci_session_secret_0123456789abcdef0123456789abcdef
          BASIC_USER=admin
          BASIC_PASS=admin
          DEFAULT_STORAGE_TYPE=telegram
          TG_BOT_TOKEN=ci_dummy_bot_token
          TG_CHAT_ID=123456789
          HF_TOKEN=ci_dummy_hf_token
          HF_REPO=ci-owner/ci-repo
          GITHUB_TOKEN=ci_dummy_github_token
          GITHUB_REPO=ci-owner/ci-repo
          EOF

      - name: Build single runtime image
        run: docker build -t k-vault:ci .

      - name: Start single-image stack
        run: KVAULT_IMAGE=k-vault:ci docker compose up -d

      - name: Run Docker smoke checks
        run: npm run docker:smoke:ci

      - name: Capture status snapshot on failure
        if: failure()
        run: |
          mkdir -p .artifacts
          docker compose exec -T k-vault sh -lc "wget -qO- http://localhost:8080/api/status" > .artifacts/api-status.json || true
          docker compose exec -T k-vault sh -lc "cd /app/server && node -e \"const { createContainer }=require('./lib/container'); const c=createContainer(process.env); console.log(JSON.stringify(c.storageRepo.list(false).map(x=>({id:x.id,type:x.type,name:x.name,enabled:x.enabled,isDefault:x.isDefault})), null, 2));\"" > .artifacts/storage-profiles.json || true

      - name: Show runtime logs on failure
        if: failure()
        run: docker compose logs --no-color k-vault

      - name: Upload smoke diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-diagnostics
          path: .artifacts/
          if-no-files-found: warn

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans
